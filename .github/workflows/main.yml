name: RDP-Optimized
on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360 # Actual limit for GitHub-hosted runners
    steps:
      - name: System Configuration
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes
          Restart-Service -Name TermService -Force

      - name: User Creation
        run: |
          $pass = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 16 | % {[char]$_})
          $securePass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name "Creator" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "Creator"
          echo "RDP_PASS=$pass" >> $env:GITHUB_ENV

      - name: Tailscale Installation
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=marketing-station
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "Connection ready for content production."
          Write-Host "IP Address: $env:TS_IP"
          Write-Host "User: Creator"
          Write-Host "Password: $env:RDP_PASS"
          while ($true) { Start-Sleep -Seconds 300 }
